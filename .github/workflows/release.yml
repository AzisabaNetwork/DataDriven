name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Library version. ex: x.x.x, x.x.x-SNAPSHOT'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: "adopt"
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@f29f5a9d7b09a7c6b29859002d29d24e1674c884

      - name: Build
        run: ./gradlew build
        env:
          VERSION: ${{ github.event.inputs.version }}

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          path: modules/**/build/libs/*.jar

      - name: Publish all modules
        run: ./gradlew publishAll
        env:
          VERSION: ${{ github.event.inputs.version }}
          REPO_USERNAME: ${{ secrets.REPO_USERNAME }}
          REPO_PASSWORD: ${{ secrets.REPO_PASSWORD }}

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: modules/**/build/libs/*.jar
          generate_release_notes: true
